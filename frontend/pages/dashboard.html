<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — LevelUp</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <div class="layout">
    <aside class="sidebar">
      <div class="logo">LevelUp Planner</div>
      <nav>
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="tasks.html">My Tasks</a>
        <a href="kanban.html">Kanban</a>
        <a href="projects.html">Projects</a>
        <a href="stats.html">Stats</a>
      </nav>
      <div class="username" id="sidebar-username"></div>
      <button class="logout-btn" onclick="logout()">Log out</button>
    </aside>

    <main class="content">

      <!-- XP Bar -->
      <div class="level-card">
        <div class="level-badge">Level <span id="level-num">1</span></div>
        <div class="xp-bar-track">
          <div class="xp-bar" id="xp-bar" style="width:0%"></div>
        </div>
        <span class="xp-label"><span id="xp-current">0</span> / 100 XP</span>
      </div>

      <!-- Today's Tasks -->
      <section>
        <h2>Today's Tasks</h2>
        <div id="today-tasks" class="task-list">
          <p class="empty">Loading...</p>
        </div>
      </section>

      <!-- Achievements -->
      <section>
        <h2>Achievements</h2>
        <div id="achievements-grid" class="achievements-grid"></div>
      </section>

    </main>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/app.js"></script>
  <script>
    // Redirect to login if not logged in
    if (!localStorage.getItem('token')) {
      window.location.href = '../index.html';
    }

    const user = JSON.parse(localStorage.getItem('user'));
    document.getElementById('sidebar-username').textContent = user.username;

    async function loadDashboard() {
      // Load XP
      updateXPDisplay(user.xp);

      // Load today's tasks
      const tasks = await api.getToday();
      const container = document.getElementById('today-tasks');
      container.innerHTML = '';

      if (tasks.length === 0) {
        container.innerHTML = '<p class="empty">No tasks due today — enjoy your day!</p>';
      } else {
        tasks.forEach(task => {
          const div = document.createElement('div');
          div.className = 'task-item';
          div.id = 'task-' + task.task_id;
          div.innerHTML = `
            <div class="task-info">
              <span class="task-name">${task.task_name}</span>
              <div class="task-meta">
                <span class="badge badge-${task.priority}">${task.priority} · +${task.xp_reward} XP</span>
              </div>
            </div>
            <div class="task-actions">
              <button class="btn btn-accent" onclick="completeTask(${task.task_id}, this)">Complete</button>
            </div>
          `;
          container.appendChild(div);
        });
      }

      // Load achievements
      loadAchievements();
    }

    async function completeTask(taskId, btn) {
      btn.disabled = true;
      btn.textContent = 'Saving...';
      const result = await api.updateStatus(taskId, 'done');
      if (result.newXp !== undefined) {
        user.xp = result.newXp;
        localStorage.setItem('user', JSON.stringify(user));
        updateXPDisplay(result.newXp);
        const taskEl = document.getElementById('task-' + taskId);
        taskEl.classList.add('completed');
        btn.textContent = 'Done';
      }
    }

    async function loadAchievements() {
      const data = await api.getAchievements();
      const grid = document.getElementById('achievements-grid');
      grid.innerHTML = '';
      data.all.forEach(a => {
        const unlocked = data.unlocked.some(u => u.achievement_id === a.achievement_id);
        const card = document.createElement('div');
        card.className = 'achievement-card' + (unlocked ? ' unlocked' : '');
        card.innerHTML = `
          <div class="achievement-title">${a.title}</div>
          <div class="achievement-desc">${a.description}</div>
        `;
        grid.appendChild(card);
      });
    }

    function logout() {
      localStorage.clear();
      window.location.href = '../index.html';
    }

    loadDashboard();
  </script>
</body>
</html>
